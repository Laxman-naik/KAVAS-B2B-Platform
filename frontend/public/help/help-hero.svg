<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1F3A"/>
      <stop offset="0.55" stop-color="#0B1F3A"/>
      <stop offset="1" stop-color="#08172B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(660 320) rotate(90) scale(230 230)">
      <stop stop-color="#D4AF37" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="0" y="0" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="900" height="520" rx="28" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="520" rx="28" fill="url(#glow)"/>

  <!-- subtle dotted path -->
  <path d="M540 155 C 610 120, 690 140, 740 205 C 780 255, 770 325, 720 360" stroke="#FFF8EC" stroke-opacity="0.22" stroke-width="2" stroke-dasharray="2 10" fill="none"/>

  <!-- floating icons -->
  <g opacity="0.95">
    <circle cx="565" cy="150" r="24" fill="#0E2A50" stroke="#FFF8EC" stroke-opacity="0.18"/>
    <path d="M557 152c0-6 4-10 10-10s10 4 10 10-4 10-10 10" stroke="#FFF8EC" stroke-opacity="0.9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="567" cy="165" r="2" fill="#FFF8EC" fill-opacity="0.9"/>

    <circle cx="615" cy="210" r="26" fill="#0E2A50" stroke="#FFF8EC" stroke-opacity="0.18"/>
    <path d="M604 208c0-7 6-12 14-12h1c8 0 14 5 14 12v7c0 4-3 7-7 7h-15c-4 0-7-3-7-7v-7z" fill="#FFF8EC" fill-opacity="0.14"/>
    <path d="M606 214h19" stroke="#FFF8EC" stroke-opacity="0.75" stroke-width="2" stroke-linecap="round"/>
    <path d="M606 220h14" stroke="#FFF8EC" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round"/>

    <circle cx="740" cy="170" r="24" fill="#0E2A50" stroke="#FFF8EC" stroke-opacity="0.18"/>
    <path d="M730 165h20v14h-20z" stroke="#FFF8EC" stroke-opacity="0.75" stroke-width="2" fill="none"/>
    <path d="M734 184h12" stroke="#FFF8EC" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- headset base platform -->
  <g filter="url(#shadow)">
    <ellipse cx="685" cy="415" rx="165" ry="34" fill="#071425" opacity="0.72"/>
    <path d="M540 390c0-18 14-32 32-32h226c18 0 32 14 32 32v28c0 13-10 23-23 23H563c-13 0-23-10-23-23v-28z" fill="#0A1C33" stroke="#FFF8EC" stroke-opacity="0.12"/>
  </g>

  <!-- headset -->
  <g filter="url(#shadow)">
    <!-- headband -->
    <path d="M590 320c0-68 45-120 100-120s100 52 100 120" stroke="#9FB3C8" stroke-opacity="0.4" stroke-width="18" stroke-linecap="round"/>
    <path d="M606 320c0-58 38-102 84-102s84 44 84 102" stroke="#FFF8EC" stroke-opacity="0.22" stroke-width="10" stroke-linecap="round"/>

    <!-- left earcup -->
    <path d="M580 320c0-18 15-33 33-33h8c10 0 18 8 18 18v68c0 10-8 18-18 18h-8c-18 0-33-15-33-33v-38z" fill="#0E2A50" stroke="#FFF8EC" stroke-opacity="0.14"/>
    <path d="M604 304h10" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" opacity="0.85"/>

    <!-- right earcup -->
    <path d="M800 320c0-18-15-33-33-33h-8c-10 0-18 8-18 18v68c0 10 8 18 18 18h8c18 0 33-15 33-33v-38z" fill="#0E2A50" stroke="#FFF8EC" stroke-opacity="0.14"/>
    <path d="M776 304h-10" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" opacity="0.85"/>

    <!-- mic boom -->
    <path d="M748 382c18 6 34 9 48 9" stroke="#9FB3C8" stroke-opacity="0.38" stroke-width="10" stroke-linecap="round"/>
    <path d="M748 382c18 6 34 9 48 9" stroke="#FFF8EC" stroke-opacity="0.2" stroke-width="6" stroke-linecap="round"/>
    <circle cx="806" cy="391" r="10" fill="#0E2A50" stroke="#FFF8EC" stroke-opacity="0.14"/>
  </g>

  <!-- chat bubble -->
  <g filter="url(#shadow)">
    <path d="M640 260c0-18 15-33 33-33h70c18 0 33 15 33 33v34c0 18-15 33-33 33h-33l-20 16c-5 4-12 0-12-6v-10h-23c-18 0-33-15-33-33v-34z" fill="#D4AF37"/>
    <circle cx="693" cy="277" r="6" fill="#0B1F3A" fill-opacity="0.95"/>
    <circle cx="718" cy="277" r="6" fill="#0B1F3A" fill-opacity="0.95"/>
    <circle cx="743" cy="277" r="6" fill="#0B1F3A" fill-opacity="0.95"/>
  </g>
</svg>
